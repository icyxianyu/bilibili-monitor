version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3001:3001'
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:3000
      - BACKEND_URL=http://backend:3000
    depends_on:
      - backend
    restart: unless-stopped
